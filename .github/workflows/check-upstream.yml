name: Check upstream for updates

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Check upstream
        id: upstream
        run: bash scripts/check-upstream.sh --ci >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Open issue if out of sync
        if: steps.upstream.outputs.in_sync == 'false'
        uses: actions/github-script@v7
        env:
          PINNED: ${{ steps.upstream.outputs.pinned }}
          UPSTREAM: ${{ steps.upstream.outputs.upstream }}
          NEW_COMMITS: ${{ steps.upstream.outputs.new_commits }}
          COMMITS: ${{ steps.upstream.outputs.commits }}
          FILES: ${{ steps.upstream.outputs.files }}
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "upstream-update",
            });
            const existing = issues.data.find(i =>
              i.title.startsWith("🔔 Upstream pi-autoresearch has new commits")
            );
            if (existing) {
              console.log(`Issue #${existing.number} already open, skipping.`);
              return;
            }

            const { PINNED, UPSTREAM, NEW_COMMITS, COMMITS, FILES } = process.env;
            const body = [
              `The weekly upstream check found **${NEW_COMMITS}** new commit(s) in`,
              "[davebcn87/pi-autoresearch](https://github.com/davebcn87/pi-autoresearch)",
              `since our pinned SHA \`${PINNED}\` (upstream HEAD: \`${UPSTREAM}\`).`,
              "",
              "## Commits",
              "```",
              (COMMITS || "").trim() || "(none)",
              "```",
              "",
              "## Files changed",
              "```",
              (FILES || "").trim() || "(none)",
              "```",
              "",
              "## What to do",
              "",
              "1. Run `bash scripts/check-upstream.sh` locally to see the diff",
              "2. Review commits that touch `extensions/pi-autoresearch/`, `skills/autoresearch-create/`, `skills/autoresearch-finalize/`, or `skills/autoresearch-hooks/`",
              "3. Port any relevant changes into the matching plugin files",
              "4. Bump `version` in both manifest files",
              "5. Update the pinned SHA and changelog in `UPSTREAM.md`",
              "6. Close this issue once done (or with a note if changes weren't worth porting)",
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🔔 Upstream pi-autoresearch has new commits to review",
              labels: ["upstream-update"],
              body,
            });
